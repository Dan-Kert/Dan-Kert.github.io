<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dan Kert | Professional Portfolio</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        :root {
            --main-color: #4a90e2;
            --bg-color: #1a1a1a;
            --text-color: #e0e0e0;
        }

        body {
            margin: 0;
            padding: 0;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: 
                linear-gradient(rgba(0,0,0,0.85), 
                rgba(0,0,0,0.85)),
                url('https://i.ibb.co/m5QbJ4fG/image.png') center/cover fixed;
            color: var(--text-color);
            font-family: 'Arial', sans-serif;
            position: relative;
            overflow: hidden;
        }

        .main-content {
            background: rgba(26, 26, 26, 0.95);
            padding: 40px;
            border-radius: 15px;
            box-shadow: 0 0 30px rgba(74, 144, 226, 0.3);
            max-width: 800px;
            text-align: center;
            border: 1px solid var(--main-color);
            backdrop-filter: blur(5px);
            margin: 20px;
        }

        .profile-image {
            width: 250px;
            height: 250px;
            border-radius: 50%;
            border: 3px solid var(--main-color);
            margin: 20px auto;
            overflow: hidden;
            transition: transform 0.3s ease;
        }

        .profile-image:hover {
            transform: scale(1.05);
        }

        .profile-image img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        /* Стили для социальных кнопок */
        .social-links {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(120px, 1fr));
            gap: 15px;
            margin-top: 30px;
        }

        .social-link {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 15px;
            background: rgba(74, 144, 226, 0.1);
            border: 1px solid var(--main-color);
            border-radius: 10px;
            color: var(--main-color);
            text-decoration: none;
            transition: all 0.3s ease;
        }

        .social-link:hover {
            background: rgba(74, 144, 226, 0.2);
            transform: translateY(-5px);
            box-shadow: 0 5px 15px rgba(74, 144, 226, 0.3);
        }

        @media (max-width: 768px) {
            .profile-image {
                width: 200px;
                height: 200px;
            }
        }
    </style>
</head>
<body>
    <div class="main-content">
        <h1>Dan Kert</h1>
        <p>Creative Content Creator</p>
        
        <div class="profile-image">
            <img src="https://i.ibb.co/20DddgZv/image.jpg" alt="Profile Photo">
        </div>

        <div class="social-links">
            <a href="https://t.me/dankert" target="_blank" class="social-link">
                <i class="fab fa-telegram"></i>
                <span>Telegram</span>
            </a>
            <a href="https://instagram.com/_dan_kert_" target="_blank" class="social-link">
                <i class="fab fa-instagram"></i>
                <span>Instagram</span>
            </a>
            <a href="https://tiktok.com/@dan_kert" target="_blank" class="social-link">
                <i class="fab fa-tiktok"></i>
                <span>TikTok</span>
            </a>
            <a href="https://pinterest.com/dankert26" target="_blank" class="social-link">
                <i class="fab fa-pinterest"></i>
                <span>Pinterest</span>
            </a>
            <a href="https://www.reddit.com/u/Dan_Kert/s/YUjaCek8I5" target="_blank" class="social-link">
                <i class="fab fa-reddit"></i>
                <span>Reddit</span>
            </a>
            <a href="https://open.spotify.com/user/31mrtn5exfi3byj4bkgofk5zz22y?si=hhcuMvoRRJ-_ESRMy_Ss3w" target="_blank" class="social-link">
                <i class="fab fa-spotify"></i>
                <span>Spotify</span>
            </a>
        </div>
    </div>
</body>
</html>
