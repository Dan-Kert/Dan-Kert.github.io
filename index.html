<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DanKert</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: Arial, sans-serif;
            background: url('https://i.ibb.co/20DddgZv/image.jpg') no-repeat center center fixed;
            background-size: cover;
            color: white;
            text-align: center;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .container {
            background-color: rgba(0, 0, 0, 0.7);
            padding: 40px;
            border-radius: 15px;
            width: 80%;
            max-width: 600px;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.7);
        }

        .avatar {
            width: 150px;
            height: 150px;
            margin-bottom: 20px;
            border-radius: 50%;
            background-image: url('https://i.ibb.co/m5QbJ4fG/image.png');
            background-size: cover;
            background-position: center;
            animation: fadeIn 1s ease-out;
        }

        h1 {
            font-size: 2.5em;
            color: #00b0ff;
            margin-bottom: 20px;
            animation: slideIn 1s ease-out;
        }

        .links {
            display: flex;
            flex-direction: column;
            gap: 15px;
            animation: fadeIn 1.5s ease-out;
        }

        .link {
            text-decoration: none;
            font-size: 1.2em;
            color: white;
            padding: 12px 20px;
            background-color: #00b0ff;
            border-radius: 5px;
            transition: background-color 0.3s, transform 0.3s;
        }

        .link:hover {
            background-color: #0097cc;
            transform: scale(1.1);
        }

        .link:active {
            transform: scale(1);
        }

        @keyframes fadeIn {
            0% { opacity: 0; }
            100% { opacity: 1; }
        }

        @keyframes slideIn {
            0% { transform: translateY(-50px); opacity: 0; }
            100% { transform: translateY(0); opacity: 1; }
        }

    </style>
</head>
<body>

    <div class="container">
        <div class="avatar"></div>
        <h1>DanKert</h1>
        <div class="links">
            <a href="https://tiktok.com/@dan_kert" class="link" target="_blank">TikTok @dan_kert</a>

            <a href="https://www.twitch.tv/dan_kert_" class="link" target="_blank">Twitch @dan_kert_</a>
        </div>
    </div>
