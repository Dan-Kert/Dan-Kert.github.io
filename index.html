<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DanKert</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: Arial, sans-serif;
            background: rgba(0, 0, 0, 0.5) url('https://i.ibb.co/20DddgZv/image.jpg') no-repeat center center fixed;
            background-size: cover;
            color: white;
            text-align: center;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
        }

        .container {
            background-color: rgba(50, 50, 50, 0.7);
            padding: 40px;
            border-radius: 15px;
            width: 80%;
            max-width: 600px;
            box-shadow: 0 0 15px rgba(0, 0, 0, 0.8);
            border: 2px solid #00b0ff;
        }

        .avatar {
            width: 150px;
            height: 150px;
            margin-bottom: 30px;
            border-radius: 50%;
            background-image: url('https://i.ibb.co/m5QbJ4fG/image.png');
            background-size: cover;
            background-position: center;
            animation: fadeIn 1s ease-out;
            margin-top: -30px;
        }

        h1 {
            font-size: 2.5em;
            color: #00b0ff;
            margin-bottom: 30px;
            animation: slideIn 1s ease-out;
        }

        .links {
            display: flex;
            flex-direction: column;
            gap: 20px;
            animation: fadeIn 1.5s ease-out;
        }

        .link {
            text-decoration: none;
            font-size: 1.2em;
            color: white;
            padding: 12px 20px;
            background-color: transparent;
            border: 2px solid #00b0ff;
            border-radius: 5px;
            transition: background-color 0.3s, transform 0.3s, box-shadow 0.3s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        .link:hover {
            background-color: #00b0ff;
            transform: scale(1.1);
            box-shadow: 0 0 10px rgba(0, 176, 255, 0.7);
        }

        .link:active {
            transform: scale(1);
        }

        .link img {
            width: 25px;
            height: 25px;
        }

        @keyframes fadeIn {
            0% { opacity: 0; }
            100% { opacity: 1; }
        }

        @keyframes slideIn {
            0% { transform: translateY(-50px); opacity: 0; }
            100% { transform: translateY(0); opacity: 1; }
        }

    </style>
</head>
<body>

    <div class="container">
        <div class="avatar"></div>
        <h1>DanKert</h1>
        <div class="links">
            <a href="https://tiktok.com/@dan_kert" class="link" target="_blank">
                <img src="https://upload.wikimedia.org/wikipedia/commons/6/6f/TikTok_logo_2021.svg" alt="TikTok Logo"> TikTok @dan_kert
            </a>
            <a href="https://www.reddit.com/u/Dan_Kert/s/YUjaCek8I5" class="link" target="_blank">
                <img src="https://upload.wikimedia.org/wikipedia/commons/4/4b/Reddit_Logo_2022.png" alt="Reddit Logo"> Reddit @Dan_Kert
            </a>
            <a href="https://open.spotify.com/user/31mrtn5exfi3byj4bkgofk5zz22y?si=hhcuMvoRRJ-_ESRMy_Ss3w" class="link" target="_blank">
                <img src="https://upload.wikimedia.org/wikipedia/commons/4/4b/Spotify_Logo_2015.png" alt="Spotify Logo"> Spotify
            </a>
            <a href="https://instagram.com/_dan_kert_" class="link" target="_blank">
                <img src="https://upload.wikimedia.org/wikipedia/commons/a/a5/Instagram_icon.png" alt="Instagram Logo"> Instagram @_dan_kert_
            </a>
            <a href="https://pinterest.com/dankert26" class="link" target="_blank">
                <img src="https://upload.wikimedia.org/wikipedia/commons/7/7f/Pinterest-logo.png" alt="Pinterest Logo"> Pinterest
            </a>
            <a href="https://t.me/dankert" class="link" target="_blank">
                <img src="https://upload.wikimedia.org/wikipedia/commons/e/e5/Telegram_2019_logo.svg" alt="Telegram Logo"> Telegram @dankert
            </a>
            <a href="https://youtube.com/@dan_kert?si=EFOL4zoXo_fsFxfn" class="link" target="_blank">
                <img src="https://upload.wikimedia.org/wikipedia/commons/4/42/YouTube_icon_%282013-2017%29.png" alt="YouTube Logo"> YouTube @dan_kert
            </a>
            <a href="https://www.twitch.tv/dan_kert_" class="link" target="_blank">
                <img src="https://upload.wikimedia.org/wikipedia/commons/a/a7/Twitch_logo_2019.svg" alt="Twitch Logo"> Twitch @dan_kert_
            </a>
        </div>
    </div>

</body>
</html>
