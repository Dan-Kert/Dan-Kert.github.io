<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Габриэла, ты моя любовь!</title>
    <style>
        body {
            text-align: center;
            background: linear-gradient(to right, #ff7eb3, #ff758c);
            color: white;
            font-family: Arial, sans-serif;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        h1 {
            font-size: 3em;
            text-shadow: 2px 2px 5px rgba(0,0,0,0.3);
        }
        .gallery {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin: 20px 0;
        }
        img {
            width: 200px;
            height: 200px;
            object-fit: cover;
            border-radius: 15px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
        }
        .buttons {
            margin-top: 20px;
        }
        button {
            font-size: 20px;
            padding: 10px 20px;
            border: none;
            cursor: pointer;
            border-radius: 10px;
            transition: 0.3s;
            margin: 10px;
        }
        .yes {
            background: #28a745;
            color: white;
        }
        .no {
            background: #dc3545;
            color: white;
        }
        button:hover {
            opacity: 0.8;
        }
        .fireworks {
            position: fixed;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.8);
            top: 0;
            left: 0;
            display: none;
            align-items: center;
            justify-content: center;
            flex-direction: column;
        }
        .fireworks h1 {
            color: gold;
        }
    </style>
</head>
<body>

    <h1>Габриэла, ты самая прекрасная в мире!</h1>
    
    <div class="gallery">
        <img src="https://ibb.co/zhk4SQZy" alt="Габриэла 1">
        <img src="https://ibb.co/1Yqd9r0s" alt="Габриэла 2">
    </div>

    <h2>Ты покорила моё сердце, и я хочу провести с тобой всю жизнь!</h2>
    <h2>Ты выйдешь за меня?</h2>

    <div class="buttons">
        <button class="yes" onclick="showFireworks()">Да!</button>
        <button class="no" onclick="alert('Ну пожалуйста...')">Нет...</button>
    </div>

    <div class="fireworks" id="fireworks">
        <h1>УРА!!! Габриэла сказала ДА! 🎉</h1>
        <canvas id="canvas"></canvas>
    </div>

    <script>
        function showFireworks() {
            document.getElementById('fireworks').style.display = 'flex';
            startFireworks();
        }

        function startFireworks() {
            const canvas = document.getElementById('canvas');
            const ctx = canvas.getContext('2d');
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
            
            let particles = [];

            class Particle {
                constructor(x, y, color) {
                    this.x = x;
                    this.y = y;
                    this.color = color;
                    this.size = Math.random() * 5 + 2;
                    this.speedX = Math.random() * 4 - 2;
                    this.speedY = Math.random() * 4 - 2;
                    this.life = 100;
                }
                update() {
                    this.x += this.speedX;
                    this.y += this.speedY;
                    this.life--;
                }
                draw() {
                    ctx.fillStyle = this.color;
                    ctx.beginPath();
                    ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                    ctx.fill();
                }
            }

            function createFirework(x, y) {
                const colors = ['red', 'yellow', 'blue', 'green', 'purple', 'orange'];
                for (let i = 0; i < 50; i++) {
                    particles.push(new Particle(x, y, colors[Math.floor(Math.random() * colors.length)]));
                }
            }

            function animate() {
                ctx.clearRect(0, 0, canvas.width, canvas.height);
                particles.forEach((particle, index) => {
                    particle.update();
                    particle.draw();
                    if (particle.life <= 0) particles.splice(index, 1);
                });
                requestAnimationFrame(animate);
            }

            setInterval(() => createFirework(Math.random() * canvas.width, Math.random() * canvas.height), 500);
            animate();
        }
    </script>

</body>
</html>
