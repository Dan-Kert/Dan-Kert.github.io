<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dan Kert | Bio</title>
    <style>
        body {
            background-color: #000;
            color: #fff;
            font-family: Arial, sans-serif;
            text-align: center;
            margin: 0;
            padding: 0;
        }
        .container {
            margin-top: 50px;
            opacity: 0;
            animation: fadeIn 1.5s forwards;
        }
        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }
        video {
            width: 150px;
            height: 150px;
            border-radius: 50%;
            object-fit: cover;
        }
        .links {
            margin-top: 20px;
        }
        .links a {
            display: block;
            color: #fff;
            text-decoration: none;
            font-size: 18px;
            margin: 10px;
            padding: 10px;
            border: 1px solid #fff;
            border-radius: 5px;
            transition: 0.3s;
        }
        .links a:hover {
            background-color: #fff;
            color: #000;
        }
        .lang-switch {
            margin-top: 20px;
        }
        .lang-switch button {
            background: none;
            border: 1px solid #fff;
            color: #fff;
            padding: 5px 10px;
            margin: 5px;
            cursor: pointer;
            transition: 0.3s;
        }
        .lang-switch button:hover {
            background-color: #fff;
            color: #000;
        }
    </style>
</head>
<body>

<div class="container">
    <!-- Видео-аватарка -->
    <video autoplay loop muted playsinline>
        <source src="https://drive.google.com/uc?export=download&id=1RN-ClT3C_NpXIyzbstIkH6g5rZHXFzWl" type="video/mp4">
    </video>

    <h1 id="bio-title">Привет, я Dan Kert!</h1>
    <p id="bio-text">Добро пожаловать! Здесь все мои соцсети.</p>

    <!-- Ссылки -->
    <div class="links">
        <a href="https://tiktok.com/@dan_kert" target="_blank">TikTok</a>
        <a href="https://www.reddit.com/u/Dan_Kert/s/YUjaCek8I5" target="_blank">Reddit</a>
        <a href="https://open.spotify.com/user/31mrtn5exfi3byj4bkgofk5zz22y?si=hhcuMvoRRJ-_ESRMy_Ss3w" target="_blank">Spotify</a>
        <a href="https://instagram.com/_dan_kert_" target="_blank">Instagram</a>
        <a href="https://pinterest.com/dankert26" target="_blank">Pinterest</a>
        <a href="https://t.me/dankert" target="_blank">Telegram</a>
        <a href="https://youtube.com/@dan_kert?si=EFOL4zoXo_fsFxfn" target="_blank">YouTube</a>
        <a href="https://www.twitch.tv/dan_kert_" target="_blank">Twitch</a>
    </div>

    <!-- Переключение языка -->
    <div class="lang-switch">
        <button onclick="switchLang('ru')">Русский</button>
        <button onclick="switchLang('en')">English</button>
    </div>
</div>

<script>
    function switchLang(lang) {
        if (lang === 'ru') {
            document.getElementById("bio-title").innerText = "Привет, я Dan Kert!";
            document.getElementById("bio-text").innerText = "Добро пожаловать! Здесь все мои соцсети.";
        } else {
            document.getElementById("bio-title").innerText = "Hello, I'm Dan Kert!";
            document.getElementById("bio-text").innerText = "Welcome! Here are all my social media links.";
        }
    }
</script>

</body>
</html>
